name: Run Fishing Bot

on:
  schedule:
    - cron: '20 1* * *'
  workflow_dispatch:

jobs:
  run_script:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install requirements
      run: |
        pip install requests

    - name: Run bot
      run: python fishing_bot.py
